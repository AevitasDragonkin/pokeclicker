<div id="battle-tree-view" data-bind="if: App.game.gameState === GameConstants.GameState.battleTree">
    <div class="d-flex flex-column justify-content-between flex-wrap" style="min-height: 310px;">

        <div class="d-flex flex-wrap p-1" style="background-color: rgba(0,0,0,70%); justify-content: space-evenly; gap: 1rem;">
            <div>Stage 0</div>
            <div><code data-bind="text: GameConstants.formatTime(300)"></code></div>
            <div>Speed • 0</div>
        </div>

        <div class="d-flex flex-grow-1">
            <!-- ko if: App.game.battleTree.sequence.state === BattleTreeSequenceState.PREPARATION -->
            <section class="d-flex flex-column flex-grow-1">
                <div class="d-flex flex-grow-1 justify-content-center align-items-center" style="gap: 1rem;">
                    <div class="d-flex flex-column justify-content-center">
                        <img width="96" height="96" src="" alt="" data-bind="attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Rayquaza').id) }">
                        <div class="d-flex justify-content-center" style="gap: 0.25rem;">
                            <span class="flex-grow-1 text-center badge text-light text-uppercase px-1" style="line-height: normal; text-shadow: 0px 0px 1px black, 0px 0px 1px black, 0px 0px 1px black, 0px 0px 2px black, 0px 0px 2px black, 0px 0px 3px black;" data-bind="style: { 'background-color': GameConstants.TypeColor[pokemonMap['Rayquaza'].type[0]] }">
                              <small><strong data-bind="text: PokemonType[pokemonMap['Rayquaza'].type[0]]"></strong></small>
                            </span>
                            <span class="flex-grow-1 text-center badge text-light text-uppercase px-1" style="line-height: normal; text-shadow: 0px 0px 1px black, 0px 0px 1px black, 0px 0px 1px black, 0px 0px 2px black, 0px 0px 2px black, 0px 0px 3px black;" data-bind="style: { 'background-color': GameConstants.TypeColor[pokemonMap['Rayquaza'].type[1] ?? pokemonMap['Rayquaza'].type[0]] }">
                              <small><strong data-bind="text: PokemonType[pokemonMap['Rayquaza'].type[1] ?? pokemonMap['Rayquaza'].type[0]]"></strong></small>
                            </span>
                        </div>
                    </div>
                    <div class="d-flex flex-column justify-content-center">
                        <img width="96" height="96" src="" alt="" data-bind="attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Blastoise').id) }">
                        <div class="d-flex justify-content-center" style="gap: 0.25rem;">
                            <span class="flex-grow-1 text-center badge text-light text-uppercase px-1" style="line-height: normal; text-shadow: 0px 0px 1px black, 0px 0px 1px black, 0px 0px 1px black, 0px 0px 2px black, 0px 0px 2px black, 0px 0px 3px black;" data-bind="style: { 'background-color': GameConstants.TypeColor[pokemonMap['Blastoise'].type[0]] }">
                              <small><strong data-bind="text: PokemonType[pokemonMap['Blastoise'].type[0]]"></strong></small>
                            </span>
                            <span class="flex-grow-1 text-center badge text-light text-uppercase px-1" style="line-height: normal; text-shadow: 0px 0px 1px black, 0px 0px 1px black, 0px 0px 1px black, 0px 0px 2px black, 0px 0px 2px black, 0px 0px 3px black;" data-bind="style: { 'background-color': GameConstants.TypeColor[pokemonMap['Blastoise'].type[1] ?? pokemonMap['Blastoise'].type[0]] }">
                              <small><strong data-bind="text: PokemonType[pokemonMap['Blastoise'].type[1] ?? pokemonMap['Blastoise'].type[0]]"></strong></small>
                            </span>
                        </div>
                    </div>
                    <div class="d-flex flex-column justify-content-center">
                        <img width="96" height="96" src="" alt="" data-bind="attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Charizard').id) }">
                        <div class="d-flex justify-content-center" style="gap: 0.25rem;">
                            <span class="flex-grow-1 text-center badge text-light text-uppercase px-1" style="line-height: normal; text-shadow: 0px 0px 1px black, 0px 0px 1px black, 0px 0px 1px black, 0px 0px 2px black, 0px 0px 2px black, 0px 0px 3px black;" data-bind="style: { 'background-color': GameConstants.TypeColor[pokemonMap['Charizard'].type[0]] }">
                              <small><strong data-bind="text: PokemonType[pokemonMap['Charizard'].type[0]]"></strong></small>
                            </span>
                            <span class="flex-grow-1 text-center badge text-light text-uppercase px-1" style="line-height: normal; text-shadow: 0px 0px 1px black, 0px 0px 1px black, 0px 0px 1px black, 0px 0px 2px black, 0px 0px 2px black, 0px 0px 3px black;" data-bind="style: { 'background-color': GameConstants.TypeColor[pokemonMap['Charizard'].type[1] ?? pokemonMap['Charizard'].type[0]] }">
                              <small><strong data-bind="text: PokemonType[pokemonMap['Charizard'].type[1] ?? pokemonMap['Charizard'].type[0]]"></strong></small>
                            </span>
                        </div>
                    </div>
                </div>
            </section>
            <!-- /ko -->

            <!-- ko if: App.game.battleTree.sequence.state === BattleTreeSequenceState.BATTLE -->
            <section class="d-flex flex-column flex-grow-1">

                <section class="flex-grow-1" style="display: grid; grid-template-columns: 1fr 1fr; align-items: end; padding: 1rem; gap: 1rem;">
                    <div class="flex-grow-1">
                        <img width="96" height="96" src="" alt="" data-bind="
                        attr: {
                            id: `animate-damage-${$data.uuid}`,
                            src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Rayquaza').id)
                        }
                        ">
                        <div class="small" data-bind="text: PokemonHelper.displayName('Rayquaza')" style="background-color: rgba(0 0 0 / 0.35); margin-bottom: 0.25rem; border-radius: 0.25rem;"></div>
                        <div class="progress">
                            <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                css: {
                                    'bg-success': true,
                                },
                                style: { width: '75%' }
                            ">
                                <!-- ko if: $data.HP > 0 -->
                                <span><knockout data-bind="text: $data.HP.toLocaleString('en-US')"></knockout> / <knockout data-bind="text: $data.maxHP.toLocaleString('en-US')"></knockout></span>
                                <!-- /ko -->
                                <!-- ko ifnot: $data.HP > 0 -->
                                <span class="font-italic">Fainted</span>
                                <!-- /ko -->
                            </div>
                        </div>
                    </div>
                    <div class="flex-grow-1">
                        <img width="96" height="96" src="" alt="" data-bind="
                        attr: {
                            id: `animate-damage-${$data.uuid}`,
                            src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Rayquaza').id)
                        }
                        ">
                        <div class="small" data-bind="text: PokemonHelper.displayName('Rayquaza')" style="background-color: rgba(0 0 0 / 0.35); margin-bottom: 0.25rem; border-radius: 0.25rem;"></div>
                        <div class="progress">
                            <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                        css: {
                            'bg-success': true,
                        },
                        style: { width: '75%' }
                    ">
                                <!-- ko if: $data.HP > 0 -->
                                <span><knockout data-bind="text: $data.HP.toLocaleString('en-US')"></knockout> / <knockout data-bind="text: $data.maxHP.toLocaleString('en-US')"></knockout></span>
                                <!-- /ko -->
                                <!-- ko ifnot: $data.HP > 0 -->
                                <span class="font-italic">Fainted</span>
                                <!-- /ko -->
                            </div>
                        </div>
                    </div>
                </section>

                <section style="display: grid; grid-template-columns: 1fr 1fr; background-color: rgba(0 0 0 / 0.35); border-top: 1px solid rgba(0 0 0 / 0.7);">
                    <div class="d-flex justify-content-center p-1" style="gap: 0.25rem;">
                        <div>
                            <img width="32" height="32" src="" alt="" data-bind="attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Rayquaza').id) }">
                            <div class="progress" style="min-height: 3px; height: 3px;">
                                <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                css: {
                                    'bg-success': true,
                                },
                                style: { width: '75%' }
                            ">
                                </div>
                            </div>
                        </div>
                        <div>
                            <img width="32" height="32" src="" alt="" data-bind="attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Rayquaza').id) }">
                            <div class="progress" style="min-height: 3px; height: 3px;">
                                <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                css: {
                                    'bg-success': true,
                                },
                                style: { width: '75%' }
                            ">
                                </div>
                            </div>
                        </div>
                        <div>
                            <img width="32" height="32" src="" alt="" data-bind="attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Rayquaza').id) }">
                            <div class="progress" style="min-height: 3px; height: 3px;">
                                <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                css: {
                                    'bg-success': true,
                                },
                                style: { width: '75%' }
                            ">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-center p-1" style="gap: 0.25rem;">
                        <div>
                            <img width="32" height="32" src="" alt="" data-bind="attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Rayquaza').id) }">
                            <div class="progress" style="min-height: 3px; height: 3px;">
                                <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                css: {
                                    'bg-success': true,
                                },
                                style: { width: '75%' }
                            ">
                                </div>
                            </div>
                        </div>
                        <div>
                            <img width="32" height="32" src="" alt="" data-bind="attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Rayquaza').id) }">
                            <div class="progress" style="min-height: 3px; height: 3px;">
                                <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                css: {
                                    'bg-success': true,
                                },
                                style: { width: '75%' }
                            ">
                                </div>
                            </div>
                        </div>
                        <div>
                            <img width="32" height="32" src="" alt="" data-bind="attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName('Rayquaza').id) }">
                            <div class="progress" style="min-height: 3px; height: 3px;">
                                <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                css: {
                                    'bg-success': true,
                                },
                                style: { width: '75%' }
                            ">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

            </section>
            <!-- /ko -->
        </div>

        <div class="small px-3 py-1" style="background-color: rgba(0,0,0,70%); margin: 0">
            <div data-bind="tooltip: {
                title: App.game.battleTree.level >= GameConstants.BATTLE_TREE_MAX_LEVEL ? (App.game.battleTree.experience - BattleTree.convertLevelToExperience(App.game.battleTree.level)).toLocaleString('en-US') : `${(App.game.battleTree.experience - BattleTree.convertLevelToExperience(App.game.battleTree.level)).toLocaleString('en-US')} / ${(BattleTree.convertLevelToExperience(App.game.battleTree.level + 1) - BattleTree.convertLevelToExperience(App.game.battleTree.level)).toLocaleString('en-US')}`,
                trigger: 'hover'
            }">
                <div>Level <knockout data-bind="text: App.game.battleTree.level"></knockout></div>
                <div class="progress" style="min-height: 10px; height: 10px;">
                    <div class="progress-bar bg-info"
                         role="progressbar"
                         data-bind="style: { width: App.game.battleTree.progressToNextLevel.toLocaleString('en-US', { style: 'percent', minimumFractionDigits: 1, maximumFractionDigits: 1 }) }"
                         aria-valuemin="0"
                         aria-valuemax="100"
                    >
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
