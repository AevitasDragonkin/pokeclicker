<div id="battle-tree-view" data-bind="if: App.game.gameState === GameConstants.GameState.battleTree">
    <div class="d-flex flex-column justify-content-between flex-wrap" style="min-height: 310px;">
        <div class="d-flex flex-wrap p-1" style="background-color: rgba(0,0,0,70%); justify-content: space-evenly; gap: 1rem;">
            <div>Stage <knockout data-bind="text: App.game.battleTree.sequence.stage"></knockout></div>
            <div data-bind="tooltip: App.game.battleTree.sequence.timerTooltip">
                <!-- ko if: [BattleTreeSequenceState.PREPARATION, BattleTreeSequenceState.POWERUP].includes(App.game.battleTree.sequence.state) -->
                <code data-bind="text: GameConstants.formatTime(App.game.battleTree.sequence.setupTime)"></code>
                <!-- /ko -->

                <!-- ko if: [BattleTreeSequenceState.BATTLE, BattleTreeSequenceState.MODIFIER].includes(App.game.battleTree.sequence.state) -->
                <code data-bind="text: GameConstants.formatTime(App.game.battleTree.sequence.engagementTime)"></code>
                <!-- /ko -->

                <!-- ko if: [BattleTreeSequenceState.REWARD, BattleTreeSequenceState.FINISHED].includes(App.game.battleTree.sequence.state) -->
                <code data-bind="text: GameConstants.formatTime(App.game.battleTree.sequence.totalTime)"></code>
                <!-- /ko -->
            </div>
        </div>

        <div class="d-flex flex-grow-1">
            <!-- ko if: App.game.battleTree.sequence.state === BattleTreeSequenceState.PREPARATION -->
            <section class="d-flex flex-column flex-grow-1">
                <div class="d-flex flex-grow-1 p-1 justify-content-center align-items-center" style="gap: 1rem;">
                    <!-- ko foreach: App.game.battleTree.sequence.teams['Team_A'].list -->
                    <div class="d-flex flex-column h-100 justify-content-center">
                        <div class="small px-1" data-bind="text: PokemonHelper.displayName($data.name)" style="background-color: rgba(0 0 0 / 0.5); margin-bottom: 0.25rem; border-radius: 0.25rem;"></div>
                        <div class="flex-grow-1">
                            <img width="96" height="96" src="" alt="" data-bind="attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName($data.name).id) }">
                        </div>
                        <div class="d-flex flex-wrap justify-content-center rounded p-1" style="gap: 0.25rem; margin-bottom: 0.25rem; background-color: rgba(0 0 0 / 0.35)">
                            <span class="flex-grow-1 text-center badge text-light text-uppercase px-1" style="line-height: normal; text-shadow: 0px 0px 1px black, 0px 0px 1px black, 0px 0px 1px black, 0px 0px 2px black, 0px 0px 2px black, 0px 0px 3px black;" data-bind="style: { 'background-color': GameConstants.TypeColor[pokemonMap[$data.name].type[0]] }">
                              <small><strong data-bind="text: PokemonType[pokemonMap[$data.name].type[0]]"></strong></small>
                            </span>
                            <!-- ko if: !!pokemonMap[$data.name].type[1] -->
                            <span class="flex-grow-1 text-center badge text-light text-uppercase px-1" style="line-height: normal; text-shadow: 0px 0px 1px black, 0px 0px 1px black, 0px 0px 1px black, 0px 0px 2px black, 0px 0px 2px black, 0px 0px 3px black;" data-bind="style: { 'background-color': GameConstants.TypeColor[pokemonMap[$data.name].type[1]] }">
                              <small><strong data-bind="text: PokemonType[pokemonMap[$data.name].type[1]]"></strong></small>
                            </span>
                            <!-- /ko -->
                        </div>
                        <div class="d-flex flex-column rounded px-1" style="background-color: rgba(0 0 0 / 0.35)">
                            <div class="small"><knockout data-bind="text: $data.attack"></knockout> Attack</div>
                            <div class="small"><knockout data-bind="text: $data.defense"></knockout> Defense</div>
                            <div class="small"><knockout data-bind="text: $data.speed"></knockout> Speed</div>
                        </div>
                    </div>
                    <!-- /ko -->
                </div>
            </section>
            <!-- /ko -->

            <!-- ko if: App.game.battleTree.sequence.state === BattleTreeSequenceState.BATTLE -->
            <section class="d-flex flex-column flex-grow-1">

                <section class="flex-grow-1" style="display: grid; grid-template-columns: 1fr 1fr; align-items: end; padding: 1rem; gap: 1rem;">
                    <div class="flex-grow-1">
                        <!-- ko with: App.game.battleTree.sequence.fight.pokemonA -->
                        <img width="96" height="96" src="" alt="" data-bind="
                        attr: {
                            id: `animate-damage-${$data.uuid}`,
                            src: PokemonHelper.getImage(PokemonHelper.getPokemonByName($data.name).id)
                        }
                        ">
                        <div class="small" data-bind="text: `Lvl. ${$data.level} ${PokemonHelper.displayName($data.name)}`" style="background-color: rgba(0 0 0 / 0.35); margin-bottom: 0.25rem; border-radius: 0.25rem;"></div>
                        <div class="progress">
                            <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                css: {
                                    'bg-success': $data.hitpoints / $data.maxHitpoints >= 0.5,
                                    'bg-warning': $data.hitpoints / $data.maxHitpoints >= 0.2 && $data.hitpoints / $data.maxHitpoints < 0.5,
                                    'bg-danger': $data.hitpoints / $data.maxHitpoints < 0.2
                                },
                                style: { width: ($data.hitpoints / $data.maxHitpoints).toLocaleString('en-US', { style: 'percent' }) }
                            ">
                                <!-- ko if: $data.hitpoints > 0 -->
                                <span><knockout data-bind="text: $data.hitpoints.toLocaleString('en-US')"></knockout> / <knockout data-bind="text: $data.maxHitpoints.toLocaleString('en-US')"></knockout></span>
                                <!-- /ko -->
                                <!-- ko ifnot: $data.hitpoints > 0 -->
                                <span class="font-italic">Fainted</span>
                                <!-- /ko -->
                            </div>
                        </div>
                        <!-- /ko -->
                    </div>
                    <div class="flex-grow-1">
                        <!-- ko with: App.game.battleTree.sequence.fight.pokemonB -->
                        <img width="96" height="96" src="" alt="" data-bind="
                        attr: {
                            id: `animate-damage-${$data.uuid}`,
                            src: PokemonHelper.getImage(PokemonHelper.getPokemonByName($data.name).id, $data.shiny, $data.gender, false)
                        }
                        ">
                        <div class="small" data-bind="text: `Lvl. ${$data.level} ${PokemonHelper.displayName($data.name)}`" style="background-color: rgba(0 0 0 / 0.35); margin-bottom: 0.25rem; border-radius: 0.25rem;"></div>
                        <div class="progress">
                            <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                css: {
                                    'bg-success': $data.hitpoints / $data.maxHitpoints >= 0.5,
                                    'bg-warning': $data.hitpoints / $data.maxHitpoints >= 0.2 && $data.hitpoints / $data.maxHitpoints < 0.5,
                                    'bg-danger': $data.hitpoints / $data.maxHitpoints < 0.2
                                },
                                style: { width: ($data.hitpoints / $data.maxHitpoints).toLocaleString('en-US', { style: 'percent' }) }
                            ">
                                <!-- ko if: $data.hitpoints > 0 -->
                                <span><knockout data-bind="text: $data.hitpoints.toLocaleString('en-US')"></knockout> / <knockout data-bind="text: $data.maxHitpoints.toLocaleString('en-US')"></knockout></span>
                                <!-- /ko -->
                                <!-- ko ifnot: $data.hitpoints > 0 -->
                                <span class="font-italic">Fainted</span>
                                <!-- /ko -->
                            </div>
                        </div>
                        <!-- /ko -->
                    </div>
                </section>

                <section style="display: grid; grid-template-columns: 1fr 1fr; background-color: rgba(0 0 0 / 0.35); border-top: 1px solid rgba(0 0 0 / 0.7);">
                    <div class="d-flex justify-content-center p-1" style="gap: 0.25rem;">
                        <!-- ko foreach: App.game.battleTree.sequence.teams['Team_A'].list -->
                        <div>
                            <img width="32" height="32" src="" alt="" data-bind="
                                css: { 'battle-tree-pokemon-fainted': $data.hitpoints === 0 },
                                attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName($data.name).id) }
                            ">
                            <div class="progress" style="min-height: 3px; height: 3px;">
                                <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                    css: {
                                        'bg-success': $data.hitpoints / $data.maxHitpoints >= 0.5,
                                        'bg-warning': $data.hitpoints / $data.maxHitpoints >= 0.2 && $data.hitpoints / $data.maxHitpoints < 0.5,
                                        'bg-danger': $data.hitpoints / $data.maxHitpoints < 0.2
                                    },
                                    style: { width: ($data.hitpoints / $data.maxHitpoints).toLocaleString('en-US', { style: 'percent' }) }
                                ">
                                </div>
                            </div>
                        </div>
                        <!-- /ko -->
                    </div>
                    <div class="d-flex justify-content-center p-1" style="gap: 0.25rem;">
                        <!-- ko foreach: App.game.battleTree.sequence.teams['Team_B'].list -->
                        <div>
                            <img width="32" height="32" src="" alt="" data-bind="
                                css: { 'battle-tree-pokemon-fainted': $data.hitpoints === 0 },
                                attr: { src: PokemonHelper.getImage(PokemonHelper.getPokemonByName($data.name).id, $data.shiny, $data.gender, false) }
                            ">
                            <div class="progress" style="min-height: 3px; height: 3px;">
                                <div class="progress-bar bg-danger" role="progressbar" aria-valuemin="0" aria-valuemax="100" data-bind="
                                    css: {
                                        'bg-success': $data.hitpoints / $data.maxHitpoints >= 0.5,
                                        'bg-warning': $data.hitpoints / $data.maxHitpoints >= 0.2 && $data.hitpoints / $data.maxHitpoints < 0.5,
                                        'bg-danger': $data.hitpoints / $data.maxHitpoints < 0.2
                                    },
                                    style: { width: ($data.hitpoints / $data.maxHitpoints).toLocaleString('en-US', { style: 'percent' }) }
                                ">
                                </div>
                            </div>
                        </div>
                        <!-- /ko -->
                    </div>
                </section>

            </section>
            <!-- /ko -->

            <!-- ko if: App.game.battleTree.sequence.state === BattleTreeSequenceState.MODIFIER -->
            <section class="d-flex flex-column flex-grow-1">
                <div class="p-1 text-center small font-italic" style="background-color: rgba(0 0 0 / 0.35);">Click to select a modifier</div>
                <div class="p-1" style="display: grid; gap: 0.25rem;">
                    <!-- ko foreach: App.game.battleTree.sequence.modifierManager.candidates() -->
                    <!-- ko with: App.game.battleTree.sequence.modifierManager.getModifierById($data) -->
                    <div class="d-flex align-items-start p-1" data-bind="click: () => { App.game.battleTree.sequence.pickModifier($data.id) }" style="background-color: rgba(0 0 0 / 0.35); border-radius: 0.25rem; gap: 0.25rem;">
                        <div class="p-1 border">
                            <img width="32" height="32" src="" alt="" data-bind="
                                attr: {
                                    src: PokemonHelper.getImage(0),
                                }
                            ">
                        </div>

                        <div class="d-flex flex-column flex-grow-1 text-left">
                            <div class="font-weight-bold" data-bind="text: $data.name"></div>
                            <div class="small" data-bind="text: App.game.battleTree.sequence.modifierManager.resolveModifierDescription($data.id)"></div>
                        </div>
                    </div>
                    <!-- /ko -->
                    <!-- /ko -->
                </div>
            </section>
            <!-- /ko -->

            <!-- ko if: App.game.battleTree.sequence.state === BattleTreeSequenceState.REWARD -->
            <section class="d-flex flex-column flex-grow-1 justify-content-center align-items-center">
                <button class="btn btn-success text-light" onclick="App.game.battleTree.sequence.claimRewards()">Claim rewards</button>
            </section>
            <!-- /ko -->

            <!-- ko if: App.game.battleTree.sequence.state === BattleTreeSequenceState.FINISHED -->
            <section class="d-flex flex-column flex-grow-1 justify-content-center align-items-center">
                <button class="btn btn-success text-light" onclick="App.game.battleTree.startNewSequence()">Start new</button>
            </section>
            <!-- /ko -->
        </div>

        <div class="small px-3 py-1" style="background-color: rgba(0,0,0,70%); margin: 0">
            <div data-bind="tooltip: {
                title: App.game.battleTree.level >= GameConstants.BATTLE_TREE_MAX_LEVEL ? (App.game.battleTree.experience - BattleTree.convertLevelToExperience(App.game.battleTree.level)).toLocaleString('en-US') : `${(App.game.battleTree.experience - BattleTree.convertLevelToExperience(App.game.battleTree.level)).toLocaleString('en-US')} / ${(BattleTree.convertLevelToExperience(App.game.battleTree.level + 1) - BattleTree.convertLevelToExperience(App.game.battleTree.level)).toLocaleString('en-US')}`,
                trigger: 'hover'
            }">
                <div>Level <knockout data-bind="text: App.game.battleTree.level"></knockout></div>
                <div class="progress" style="min-height: 10px; height: 10px;">
                    <div class="progress-bar bg-info"
                         role="progressbar"
                         data-bind="style: { width: App.game.battleTree.progressToNextLevel.toLocaleString('en-US', { style: 'percent', minimumFractionDigits: 1, maximumFractionDigits: 1 }) }"
                         aria-valuemin="0"
                         aria-valuemax="100"
                    >
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
